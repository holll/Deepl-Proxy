name = "deepl-proxy"
main = "src/index.js"
compatibility_date = "2026-04-02"

# 保留在 Cloudflare Dashboard 中手动配置的 Variables/Secrets，
# 避免每次 deploy 被 wrangler.toml 覆盖清空。
keep_vars = true

[vars]
ALLOW_ORIGIN = "*"
CACHE_TTL_SECONDS = "0"

[triggers]
crons = ["0 * * * *"]

# 把 D1 绑定声明写入配置，避免部署时丢失绑定。
# 请替换为你自己的 database_id。
[[d1_databases]]
binding = "DB"
database_name = "deepl-gateway-db"

[assets]
directory = "./webui"
binding = "ASSETS"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
